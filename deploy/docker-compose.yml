# ============================================
# docker-compose.yml - C++ demo 应用部署
# ============================================

services:
  demo-app:
    build:
      context: .      # Dockerfile 所在目录
      dockerfile: Dockerfile
    image: demo-cpp-app:latest
    container_name: demo-cpp-app
    # 应用执行完即退出，不重启
    restart: "no"
    # 分配伪终端，确保标准输出正常
    tty: false
    stdin_open: false
    # 可选：资源限制
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "64M"
